name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Bible XMLs
        run: |
          mkdir -p bibles
          curl -L --fail \
            "https://raw.githubusercontent.com/sajeevavahini/bibles/refs/heads/main/Telugu%20Bible%20(BSI).xml" \
            -o "bibles/telugu-bsi.xml"
          curl -L --fail \
            "https://raw.githubusercontent.com/sajeevavahini/bibles/refs/heads/main/New%20International%20Version%20(UK).xml" \
            -o "bibles/niv-uk.xml"
          echo "Downloaded:"
          ls -lh bibles/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
